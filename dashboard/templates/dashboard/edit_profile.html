{% extends "base.html" %}

{% block content %}

<section class="bg-gradient-to-r from-purple-700 via-blue-700 to-slate-900 py-16">

    <div class="max-w-4xl mx-auto px-6">

        <h1 class="text-5xl font-bold text-white">
            Edit Profile
        </h1>

        <p class="text-gray-300 mt-3">
            Update your personal information.
        </p>

    </div>

</section>


<section class="max-w-4xl mx-auto py-12 px-6">

    <div class="bg-white rounded-2xl shadow-xl p-8">

        <form method="POST">

            {% csrf_token %}

            <div class="space-y-6">

                <div>

                    <label class="font-semibold">
                        First Name
                    </label>

                    {{ form.first_name }}

                </div>

                <div>

                    <label class="font-semibold">
                        Last Name
                    </label>

                    {{ form.last_name }}

                </div>

                <div>

                    <label class="font-semibold">
                        Email
                    </label>

                    {{ form.email }}

                </div>

            </div>

            <div class="mt-8 flex gap-4">

                <button
                    type="submit"
                    class="bg-purple-600 hover:bg-purple-700 text-white px-8 py-3 rounded-lg">

                    Save Changes

                </button>

                <a href="{% url 'dashboard' %}"
                   class="bg-gray-200 hover:bg-gray-300 px-8 py-3 rounded-lg">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</section>

{% endblock %}
