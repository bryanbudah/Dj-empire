{% extends "base.html" %}

{% block content %}

<section class="bg-gradient-to-r from-purple-700 via-blue-700 to-slate-900 py-16">

    <div class="max-w-4xl mx-auto px-6">

        <h1 class="text-5xl font-bold text-white">
            Change Password
        </h1>

        <p class="text-gray-300 mt-3">
            Keep your account secure by using a strong password.
        </p>

    </div>

</section>


<section class="max-w-4xl mx-auto py-12 px-6">

    <div class="bg-white rounded-2xl shadow-xl p-8">

        <form method="POST">

            {% csrf_token %}

            <div class="space-y-6">

                {{ form.as_p }}

            </div>

            <button
                type="submit"
                class="mt-6 bg-purple-600 hover:bg-purple-700 text-white px-8 py-3 rounded-lg">

                Update Password

            </button>

        </form>

    </div>

</section>

{% endblock %}
