{% extends "base.html" %}

{% block content %}

<section class="min-h-screen flex items-center justify-center bg-slate-100">

    <div class="text-center px-6">

        <h1 class="text-8xl font-extrabold text-purple-700">
            404
        </h1>

        <h2 class="text-4xl font-bold mt-6">
            Oops! Page Not Found
        </h2>

        <p class="text-gray-600 mt-4 max-w-lg mx-auto">
            The page you're looking for doesn't exist or may have been moved.
        </p>

        <a href="{% url 'home' %}"
           class="inline-block mt-8 bg-gradient-to-r from-purple-600 to-blue-600 text-white px-8 py-3 rounded-xl shadow-lg hover:opacity-90">

            🏠 Back to Home

        </a>

    </div>

</section>

{% endblock %}
