{% extends "base.html" %}

{% block content %}
<section class="min-h-screen bg-gradient-to-br from-purple-700 via-blue-700 to-slate-900 flex items-center justify-center py-16 px-4">
    <div class="bg-white shadow-2xl rounded-3xl p-8 w-full max-w-lg">
        <h1 class="text-3xl font-extrabold text-center text-slate-800">
            Set New Password
        </h1>
        <p class="text-center text-gray-500 mt-2 text-sm">
            Enter your new password below.
        </p>
        <form method="POST" class="mt-8 space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">New Password</label>
                <input type="password" name="new_password1" required
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
                    placeholder="Enter new password">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm New Password</label>
                <input type="password" name="new_password2" required
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
                    placeholder="Confirm new password">
            </div>
            {% if form.errors %}
            <div class="bg-red-50 border border-red-300 rounded-xl p-3">
                <p class="text-red-500 text-sm">{{ form.errors }}</p>
            </div>
            {% endif %}
            <button type="submit"
                class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-4 rounded-xl font-bold hover:scale-105 transition">
                Reset Password
            </button>
        </form>
    </div>
</section>
{% endblock %}
