{% extends "base.html" %}

{% block content %}
<section class="min-h-screen bg-gradient-to-br from-purple-700 via-blue-700 to-slate-900 flex items-center justify-center py-16 px-4">
    <div class="bg-white shadow-2xl rounded-3xl p-8 w-full max-w-md text-center">

        <div class="text-6xl mb-4">✅</div>
        <h1 class="text-3xl font-extrabold text-slate-800">Password Changed!</h1>
        <p class="text-gray-500 mt-3 text-sm">
            Your password has been successfully updated.
            You can now login with your new password.
        </p>

        <a href="{% url 'login' %}"
           class="inline-block mt-8 w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-4 rounded-xl font-bold hover:scale-105 transition">
            Login Now
        </a>

    </div>
</section>
{% endblock %}
