{% extends "base.html" %}

{% block content %}

<section class="min-h-screen bg-gradient-to-br from-purple-700 via-blue-700 to-slate-900 flex items-center justify-center py-16 px-4">

    <div class="bg-white shadow-2xl rounded-3xl p-8 w-full max-w-md">

        <h1 class="text-3xl font-extrabold text-center text-slate-800">
            Welcome Back
        </h1>

        <p class="text-center text-gray-500 mt-2 text-sm">
            Login to your DJ CHOPPA_xL account.
        </p>

        <form method="POST" class="mt-8 space-y-4">

            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Username
                </label>
                <input
                    type="text"
                    name="username"
                    required
                    autofocus
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
                    placeholder="Enter your username">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Password
                </label>
                <input
                    type="password"
                    name="password"
                    required
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
                    placeholder="Enter your password">
            </div>

            <!-- Forgot Password -->
            <div class="text-right">
                <a href="{% url 'password_reset' %}"
                   class="text-sm text-purple-600 font-semibold hover:underline">
                    Forgot password?
                </a>
            </div>

            <!-- Errors -->
            {% if form.errors %}
            <div class="bg-red-50 border border-red-300 rounded-xl p-3">
                <p class="text-red-500 text-sm text-center">
                    Invalid username or password. Please try again.
                </p>
            </div>
            {% endif %}

            <button
                type="submit"
                class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-4 rounded-xl font-bold hover:scale-105 transition">
                Login
            </button>

        </form>

        <p class="text-center mt-6 text-gray-600 text-sm">
            Don't have an account?
            <a href="{% url 'register' %}"
               class="text-purple-600 font-semibold hover:underline">
                Register
            </a>
        </p>

    </div>

</section>

{% endblock %}
