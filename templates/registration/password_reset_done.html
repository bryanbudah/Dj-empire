{% extends "base.html" %}

{% block content %}
<section class="min-h-screen bg-gradient-to-br from-purple-700 via-blue-700 to-slate-900 flex items-center justify-center py-16 px-4">
    <div class="bg-white shadow-2xl rounded-3xl p-8 w-full max-w-lg text-center">
        <div class="text-6xl mb-4">📧</div>
        <h1 class="text-3xl font-extrabold text-slate-800">Check Your Email</h1>
        <p class="text-gray-500 mt-3 text-sm">
            We've sent a password reset link to your email address.
            Check your inbox and follow the instructions.
        </p>
        <a href="{% url 'login' %}"
           class="inline-block mt-8 bg-gradient-to-r from-purple-600 to-blue-600 text-white py-3 px-8 rounded-xl font-bold hover:scale-105 transition">
            Back to Login
        </a>
    </div>
</section>
{% endblock %}
