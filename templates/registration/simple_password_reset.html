{% extends "base.html" %}

{% block content %}
<section class="min-h-screen bg-gradient-to-br from-purple-700 via-blue-700 to-slate-900 flex items-center justify-center py-16 px-4">
    <div class="bg-white shadow-2xl rounded-3xl p-8 w-full max-w-md">

        <div class="text-center mb-6">
            <div class="text-5xl mb-3">🔐</div>
            <h1 class="text-3xl font-extrabold text-slate-800">Forgot Password?</h1>
            <p class="text-gray-500 mt-2 text-sm">Enter your username and we'll let you reset your password.</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                {{ form.username }}
                {% if form.username.errors %}
                    <p class="text-red-500 text-xs mt-1">{{ form.username.errors.0 }}</p>
                {% endif %}
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-4 rounded-xl font-bold hover:scale-105 transition">
                Continue
            </button>
        </form>

        <p class="text-center mt-6 text-gray-600 text-sm">
            Remember your password?
            <a href="{% url 'login' %}" class="text-purple-600 font-semibold hover:underline">Login</a>
        </p>

    </div>
</section>
{% endblock %}
