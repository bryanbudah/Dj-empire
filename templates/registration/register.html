{% extends "base.html" %}

{% block content %}

<section class="min-h-screen bg-gradient-to-r from-purple-700 via-blue-700 to-slate-900 flex items-center justify-center py-16">

    <div class="bg-white shadow-2xl rounded-3xl p-10 w-full max-w-lg">

        <h1 class="text-4xl font-extrabold text-center text-slate-800">
            Create Account
        </h1>

        <p class="text-center text-gray-500 mt-3">
            Join DJ Empire and manage your bookings.
        </p>

        <form method="POST" class="mt-8 space-y-5">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="w-full bg-gradient-to-r from-purple-600 to-blue-600
                       text-white py-4 rounded-xl font-bold
                       hover:scale-105 transition">

                Register

            </button>

        </form>

        <p class="text-center mt-8 text-gray-600">

            Already have an account?

            <a href="{% url 'login' %}"
               class="text-purple-600 font-semibold hover:underline">

                Login

            </a>

        </p>

    </div>

</section>

{% endblock %}
